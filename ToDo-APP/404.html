<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투두 캘린더</title>
  <script>
    (function redirectToHashRoute() {
      var location = window.location;
      var pathSegments = location.pathname.split('/').filter(Boolean);
      var basePath = pathSegments.length ? '/' + pathSegments[0] : '';
      var routePath = '/' + pathSegments.slice(1).join('/');
      var nextPath = location.origin + basePath + '/#' + routePath;

      if (location.search) {
        nextPath += location.search;
      }

      if (location.hash) {
        nextPath += location.hash;
      }

      window.location.replace(nextPath);
    })();
  </script>
</head>
<body></body>
</html>
