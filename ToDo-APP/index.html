  <script>
    (function restoreThemePreference() {
      var themeKey = 'todoTheme';

      try {
        var storedTheme = localStorage.getItem(themeKey);
        var theme = storedTheme === 'dark' || storedTheme === 'light'
          ? storedTheme
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (error) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
  <script>
    (function restoreSpaRouteFromQuery() {
      var url = new URL(window.location.href);
      var route = url.searchParams.get('p');
      if (!route) return;

      var query = url.searchParams.get('q');
      var basePath = window.location.pathname.replace(/\/$/, '');
      var nextPath = basePath + decodeURIComponent(route);

      if (query) {
        nextPath += '?' + decodeURIComponent(query);
      }

      if (window.location.hash) {
        nextPath += window.location.hash;
      }

      window.history.replaceState(null, '', nextPath);
    })();
  </script>
